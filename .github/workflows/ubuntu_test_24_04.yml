name: Ubuntu 24.04 Tests

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (apt)
        # Noble ships python3-antlr4 4.9.2-1, which matches the runtime
        # the grammar in src/dpmcore/dpm_xl/grammar/generated/ was built
        # against (ANTLR 4.9.2, see .agent/project_instructions.md).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-antlr4 \
            python3-click \
            python3-django \
            python3-fastapi \
            python3-httpx \
            python3-mssql-django \
            python3-pandas \
            python3-psycopg2 \
            python3-pyodbc \
            python3-pytest \
            python3-rich \
            python3-uvicorn \
            unixodbc-dev

      - name: Install pip-only dependencies
        # SQLAlchemy: Noble ships 1.4; dpmcore ORM requires 2.0 APIs.
        # pytest-django: Noble 4.5.2 is below the dpmcore floor (>=4.9).
        run: |
          pip install --break-system-packages \
            "sqlalchemy>=2.0,<3.0" \
            "pytest-django>=4.9"

      - name: Install poetry
        run: |
          pip install --break-system-packages poetry
          poetry config virtualenvs.create false

      - name: Build wheel
        run: poetry build -f wheel -o .

      - name: Install built package
        run: |
          pip install \
            "./dpmcore-$(poetry version -s)-py3-none-any.whl" \
            --no-dependencies --break-system-packages

      - name: Run tests
        run: >-
          pytest
          --verbose --tb=short
          --strict-markers --strict-config
          --durations=10 tests/
