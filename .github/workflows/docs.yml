name: Publish documentation

run-name: "Publish documentation ${{ github.event.client_payload.tag_name || github.event.release.tag_name || '' }}"

on:
  release:
    types: [published]
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Pages
        # Pages APIs need write scope, which PRs (esp. Dependabot/forks) lack.
        if: github.event_name != 'pull_request'
        id: pages
        uses: actions/configure-pages@v6
      - name: Install poetry
        run: pipx install poetry
      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        # --all-extras is required: importing any dpmcore.services.* module
        # pulls in optional deps (pandas via the DPM-XL engine, openpyxl for
        # the layout exporter, ...). Without them autodoc fails to import the
        # modules and the API pages render empty.
        run: poetry install --all-extras --with docs
      - name: Verify docs build (PR)
        # PRs run a read-only token, so we can't deploy. Build the working tree
        # single-version with warnings-as-errors -- this is the gate that
        # catches broken autodoc imports / incompatible Sphinx upgrades.
        if: github.event_name == 'pull_request'
        run: poetry run sphinx-build -W --keep-going docs docs/_build/html
      - name: Build versioned docs
        if: github.event_name != 'pull_request'
        run: poetry run sphinx-polyversion docs/poly.py
      - name: Generate root redirect
        if: github.event_name != 'pull_request'
        run: |
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=master/">
            <title>dpmcore documentation</title>
          </head>
          <body>
            <p>Redirecting to <a href="master/">master</a>...</p>
          </body>
          </html>
          EOF
      - name: Copy CNAME to root
        if: github.event_name != 'pull_request'
        run: cp docs/CNAME _site/CNAME
      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
